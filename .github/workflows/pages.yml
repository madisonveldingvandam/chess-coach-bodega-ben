name: Refresh + deploy static dashboard

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install backend dependencies
        run: uv sync --group dev

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Cache Chess.com archives
        uses: actions/cache@v4
        with:
          path: data/chesscom
          key: chesscom-archives-${{ github.run_id }}
          restore-keys: |
            chesscom-archives-

      - name: Run backend tests
        run: uv run pytest

      - name: Generate static dashboard data
        run: uv run python scripts/generate_static_dashboard.py --username bodegaben --time-class blitz --max-archives 6

      - name: Build frontend for GitHub Pages
        working-directory: frontend
        env:
          VITE_BASE_PATH: /chess-coach-bodega-ben/
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - id: deployment
        uses: actions/deploy-pages@v4
